name: Server Tests

on:
  push:
    branches: [main, app, preprod]
  pull_request:
    branches: [main, app, preprod]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bench
        run: pip install frappe-bench

      - name: Init Bench
        run: bench init --skip-redis-config-generation --skip-assets frappe-bench

      - name: Get Lodin App
        run: |
          cd frappe-bench
          bench get-app lodin ${{ github.workspace }}

      - name: Setup Site
        run: |
          cd frappe-bench
          bench new-site lodin.localhost \
            --mariadb-root-password root \
            --admin-password admin
          bench --site lodin.localhost install-app lodin

      - name: Run Tests
        run: |
          cd frappe-bench
          bench --site lodin.localhost run-tests --app lodin