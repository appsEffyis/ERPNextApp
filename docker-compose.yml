services:
  db:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine

  redis-queue:
    image: redis:6.2-alpine

  erpnext:
    # Utilisation de l'image bench (plus complète pour le dev)
    image: frappe/bench:latest
    environment:
      - SHELL=/bin/bash
    volumes:
      - ./frappe-bench:/home/frappe/frappe-bench
    ports:
      - "8000:8000"
    stdin_open: true
    tty: true
    # On force l'utilisateur frappe pour éviter les soucis de droits
    user: "frappe" 
    command: sleep infinity

volumes:
  db-data: